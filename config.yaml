timezone: America/New_York

stores:
  - "6911"   # replace with your local Home Depot store numbers
  - "6926"

zip_code: "10001"   # replace with your ZIP code

schedule:
  times: ["01:00", "09:00", "17:00"]   # local time, per `timezone`
  jitter_minutes: 20

delays:
  between_products_sec: [5, 10]
  between_stores_sec: [10, 20]

limits:
  max_retries_per_product: 1

alerts:
  min_savings_pct: 30
  min_savings_amount: 5000   # cents ($50.00)
  inter_store_diff_pct: 15
  observation_only: true     # set false to enable Discord alerts
  discord_webhook_url: ""    # paste your Discord webhook URL here, or use the app's Settings

watchlist_path: "watchlist.txt"
db_path: "data/tracker.sqlite3"
